events {}
http {
    server {
        listen 80;

        location /api/ {
            proxy_pass http://app:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /openapi.json {
            proxy_pass http://app:8080/openapi.json;
            proxy_set_header Host $host;
        }

        location /docs {
            proxy_pass http://app:8080/docs;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://app:8080/redoc;
            proxy_set_header Host $host;
        }

        location /auth/ {
            proxy_pass http://app:8080/auth/;
            proxy_set_header Host $host;
        }

        location /users/ {
            proxy_pass http://app:8080/users/;
            proxy_set_header Host $host;
        }

        location /balance/ {
            proxy_pass http://app:8080/balance/;
            proxy_set_header Host $host;
        }

        location /predict/ {
            proxy_pass http://app:8080/predict/;
            proxy_set_header Host $host;
        }

        location /history/ {
            proxy_pass http://app:8080/history/;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://app:8080/health;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}