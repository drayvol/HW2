version: "3"
services:
  app:
    build: ./app
    container_name: app
    env_file:
      - ./app/.env
    depends_on:
      - database
      - rabbitmq
    volumes:
      - ./app/src/:/app/src
    restart: unless-stopped

  web-proxy:
    build:
      context: ./web-proxy
    container_name: web_proxy
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    restart: on-failure
  database:
    image: postgres:15
    container_name: database
    env_file:
      - ./postgres_data/.env
    volumes:
      - ./postgres_data/data/:/var/lib/postgresql/data
    restart: unless-stopped

